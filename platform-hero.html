<!DOCTYPE html>
<html><head><meta charset="utf-8">
<style>
*{margin:0;padding:0;box-sizing:border-box}
@keyframes ph-fade-in{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes ph-fade-out{from{opacity:1}to{opacity:0}}
@keyframes ph-slide-in-r{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}
@keyframes ph-pop{0%{opacity:0;transform:scale(0.85)}60%{transform:scale(1.05)}100%{opacity:1;transform:scale(1)}}
@keyframes ph-highlight{0%,100%{background:rgba(139,92,246,0.2)}50%{background:rgba(139,92,246,0.45)}}
@keyframes ph-flash{0%{background:#ede9fe}100%{background:transparent}}
@keyframes ph-pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}
@keyframes ph-ring-spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes ph-shimmer{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
@keyframes ph-glow{0%,100%{box-shadow:0 4px 20px rgba(139,92,246,0.1)}50%{box-shadow:0 8px 32px rgba(139,92,246,0.25)}}
@keyframes ph-wave{0%{height:8px}25%{height:22px}50%{height:12px}75%{height:28px}100%{height:8px}}
@keyframes ph-badge-in{from{opacity:0;transform:translateY(8px) scale(0.9)}to{opacity:1;transform:translateY(0) scale(1)}}
@keyframes ph-check-pop{0%{transform:scale(0)}60%{transform:scale(1.3)}100%{transform:scale(1)}}
@keyframes ph-counter{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes ph-popover-in{from{opacity:0;transform:translateY(8px) scale(0.92)}to{opacity:1;transform:translateY(0) scale(1)}}
body{display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:transparent;padding:16px}
</style>
</head><body>
<div id="phRoot" style="width:1100px;height:680px;border-radius:16px;overflow:hidden;box-shadow:0 25px 60px rgba(91,33,182,0.18),0 8px 24px rgba(0,0,0,0.08);background:#fff;display:flex;flex-direction:column">
  <div style="background:linear-gradient(135deg,#6d28d9 0%,#4c1d95 50%,#1a0a3e 100%);padding:0.55rem 1.25rem;display:flex;align-items:center;gap:0.65rem;flex-shrink:0;position:relative;overflow:hidden">
    <div style="position:absolute;top:-80%;right:-10%;width:300px;height:300px;background:radial-gradient(circle,rgba(186,103,239,0.15) 0%,transparent 70%);pointer-events:none"></div>

    <span style="font-size:0.88rem;font-weight:700;color:#fff;letter-spacing:-0.01em;position:relative;z-index:1">MyPathfinder</span>
    <div style="flex:1"></div>
    <span style="font-size:0.6rem;font-weight:500;color:rgba(255,255,255,0.5);padding:3px 8px;border-radius:5px;background:rgba(255,255,255,0.08)">Alex Thompson</span>
    <div style="width:26px;height:26px;border-radius:50%;background:linear-gradient(135deg,#a78bfa,#7c3aed);display:flex;align-items:center;justify-content:center;font-size:0.6rem;font-weight:700;color:#fff">AT</div>
  </div>
  <div style="display:flex;flex:1;overflow:hidden">
    <div id="phSidebar" style="width:60px;flex-shrink:0;border-right:1px solid #f0ebfa;background:#faf8ff;display:flex;flex-direction:column;padding:0.4rem 0;gap:0.1rem"></div>
    <div style="flex:1;position:relative;overflow:hidden;background:#f8f6ff">
      <div id="phContent" style="position:absolute;inset:0;overflow:hidden"></div>
      <div id="phBadge" style="position:absolute;top:16px;right:16px;z-index:30;opacity:0"></div>
    </div>
  </div>
</div>
<script>
(function(){
var sb=document.getElementById('phSidebar');
var ct=document.getElementById('phContent');
var bg=document.getElementById('phBadge');
var navItems=[
  {icon:'📊',label:'Dashboard',key:'dashboard'},
  {icon:'📄',label:'CV Builder',key:'cv'},
  {icon:'🔍',label:'Job Search',key:'jobs'},
  {icon:'🎤',label:'Interview',key:'interview'}
];

function renderSidebar(activeKey){
  var h='';
  for(var i=0;i<navItems.length;i++){
    var n=navItems[i];
    var isA=n.key===activeKey;
    h+='<div style="display:flex;flex-direction:column;align-items:center;padding:0.5rem 0.2rem;gap:2px;border-radius:8px;margin:0 0.25rem;background:'+(isA?'#f5f3ff':'transparent')+';border:1px solid '+(isA?'#e9e0fd':'transparent')+';transition:all 0.3s ease">';
    h+='<span style="font-size:0.72rem">'+n.icon+'</span>';
    h+='<span style="font-size:0.46rem;font-weight:'+(isA?'700':'500')+';color:'+(isA?'#7c3aed':'#94a3b8')+';text-align:center;line-height:1.2">'+n.label+'</span></div>';
  }
  sb.innerHTML=h;
}

function showBadge(text,icon,delay){
  bg.style.opacity='0';
  setTimeout(function(){
    bg.innerHTML='<div style="display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:10px;background:linear-gradient(135deg,#6d28d9,#4c1d95);color:#fff;font-size:0.68rem;font-weight:700;box-shadow:0 8px 24px rgba(91,33,182,0.3);animation:ph-badge-in 0.4s ease both;white-space:nowrap"><span style="font-size:0.8rem">'+icon+'</span>'+text+'</div>';
    bg.style.opacity='1';
  },delay);
}

function hideBadge(){
  bg.style.opacity='0';
}

  h+='<span style="font-size:0.56rem;font-weight:600;color:#7c3aed;padding:3px 8px;border-radius:5px;background:#f5f3ff;border:1px solid #e9e0fd">Preview</span>';

  h+='<div style="flex:1;padding:0.75rem;display:flex;justify-content:center;position:relative">';
  h+='<div id="phCvPage" style="width:100%;max-width:440px;background:#fff;border-radius:4px;box-shadow:0 2px 12px rgba(0,0,0,0.08);padding:1.2rem 1rem;font-size:0.58rem;color:#1e1b4b;line-height:1.5;position:relative;transition:transform 0.6s ease">';

  h+='<p style="font-size:0.52rem;color:#6b7280;margin:0 0 0.4rem">alex.thompson@gmail.com • +44 7700 123456 • London, UK</p>';

  h+='<h3 style="font-size:0.58rem;font-weight:700;color:#1e1b4b;margin:0 0 0.2rem;text-transform:uppercase;letter-spacing:0.04em">Professional Profile</h3>';
  h+='<p style="font-size:0.52rem;color:#374151;margin:0 0 0.4rem;line-height:1.5">Results-driven Technical Project Manager with 6+ years of experience delivering complex digital transformation programmes.</p>';
  h+='<div style="height:1px;background:#e5e7eb;margin:0 0 0.4rem"></div>';
  h+='<h3 style="font-size:0.58rem;font-weight:700;color:#1e1b4b;margin:0 0 0.3rem;text-transform:uppercase;letter-spacing:0.04em">Work Experience</h3>';
  h+='<p style="font-size:0.55rem;font-weight:700;color:#1e1b4b;margin:0 0 0.05rem">Technical Project Manager <span style="font-weight:400;color:#94a3b8;font-size:0.48rem;float:right">Jan 2022 – Present</span></p>';
  h+='<p style="font-size:0.5rem;color:#6b7280;margin:0 0 0.2rem">Capgemini UK, London</p>';
  h+='<ul style="margin:0 0 0.35rem;padding-left:0.8rem;list-style:disc">';
  h+='<li id="phCvLi0" style="font-size:0.5rem;color:#374151;margin-bottom:0.15rem;line-height:1.45;padding:1px 2px;border-radius:2px;transition:all 0.3s ease">'+ORIG+'</li>';
  h+='<li style="font-size:0.5rem;color:#374151;margin-bottom:0.15rem;line-height:1.45">'+B2+'</li>';
  h+='<li style="font-size:0.5rem;color:#374151;margin-bottom:0.15rem;line-height:1.45">'+B3+'</li></ul>';
  h+='<p style="font-size:0.55rem;font-weight:700;color:#1e1b4b;margin:0 0 0.05rem">IT Programme Coordinator <span style="font-weight:400;color:#94a3b8;font-size:0.48rem;float:right">Sep 2019 – Dec 2021</span></p>';

  h+='<ul style="margin:0 0 0.35rem;padding-left:0.8rem;list-style:disc"><li style="font-size:0.5rem;color:#374151;margin-bottom:0.15rem;line-height:1.45">Coordinated IT infrastructure rollout across 4 UK defence sites</li></ul>';
  h+='<div style="height:1px;background:#e5e7eb;margin:0 0 0.35rem"></div>';
  h+='<h3 style="font-size:0.58rem;font-weight:700;color:#1e1b4b;margin:0 0 0.2rem;text-transform:uppercase;letter-spacing:0.04em">Skills</h3>';

  h+='<div id="phCvToast" style="position:absolute;bottom:12px;left:50%;transform:translateX(-50%);background:linear-gradient(135deg,#6d28d9,#4c1d95);color:#fff;padding:0.45rem 1rem;border-radius:10px;font-size:0.62rem;font-weight:600;display:flex;align-items:center;gap:0.4rem;box-shadow:0 8px 24px rgba(91,33,182,0.3);z-index:30;white-space:nowrap;opacity:0;transition:opacity 0.3s ease"></div>';

  h+='</div>';

// ============ SCENE 2: Job Search + High Vibes ============

  renderSidebar('jobs');

    c+='<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:0.45rem">';
    c+='<div style="flex:1"><div style="display:flex;align-items:center;gap:5px;margin-bottom:3px"><span style="font-size:0.58rem;font-weight:600;color:#6b7280">'+j.company+'</span>';
    if(isHot){c+='<span style="font-size:0.42rem;font-weight:700;color:#7c3aed;background:linear-gradient(135deg,#ede9fe,#f3e8ff);padding:1px 5px;border-radius:3px;border:1px solid #ddd6fe">Verified</span>';}

    c+='<span style="font-size:0.48rem;font-weight:500;color:#6b7280;background:#f9fafb;padding:2px 6px;border-radius:4px;border:1px solid #f3f4f6">📍 '+j.loc+'</span>';
    c+='<span style="font-size:0.48rem;font-weight:500;color:#6b7280;background:#f9fafb;padding:2px 6px;border-radius:4px;border:1px solid #f3f4f6">'+j.type+'</span>';
    c+='<span style="font-size:0.46rem;font-weight:600;color:#7c3aed;background:linear-gradient(135deg,#f5f3ff,#ede9fe);padding:2px 6px;border-radius:4px;border:1px solid #ddd6fe">'+j.mode+'</span>';
    c+='</div>';

    c+='<span style="font-size:0.7rem;font-weight:700;color:#1e1b4b">'+j.salary+'<span style="font-weight:400;color:#94a3b8;font-size:0.52rem">'+(j.salary.includes('/')?'':'/ yr')+'</span></span>';

    grid.innerHTML+=c;
    setTimeout(function(){addCard(idx+1);},180);
  }

  setTimeout(function(){addCard(0);},400);

  showBadge('Smart vibe matching','🎯',800);

  // Show vibe breakdown on hot card
  setTimeout(function(){
    var card=document.getElementById('phCard0');

      tooltip+='<p style="font-size:0.48rem;font-weight:700;color:#7c3aed;margin:0 0 0.3rem">Vibe Breakdown</p>';

      for(var i=0;i<checks.length;i++){
        tooltip+='<div style="display:flex;align-items:center;gap:4px;margin-bottom:2px"><span style="color:#22c55e;font-size:0.55rem;animation:ph-check-pop 0.3s ease '+(i*0.1)+'s both">✓</span><span style="font-size:0.48rem;color:#374151">'+checks[i].l+'</span></div>';
      }

  // Fade out
  setTimeout(function(){
    hideBadge();
    ct.style.animation='ph-fade-out 0.35s ease both';
    setTimeout(onDone,400);

  h+='</div>';
  h+='<div style="display:flex;align-items:center;gap:0.4rem;margin-bottom:0.5rem"><span style="font-size:0.48rem;font-weight:600;color:#94a3b8;text-transform:uppercase;letter-spacing:0.03em">Framework:</span>';
  h+='<span style="font-size:0.5rem;font-weight:600;color:#7c3aed;background:#f5f3ff;padding:2px 8px;border-radius:5px;border:1px solid #e9e0fd">STAR Method</span></div>';
  h+='<div id="phRecording" style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0.6rem">';
  h+='<div id="phMicCircle" style="width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,#8b5cf6,#7c3aed);display:flex;align-items:center;justify-content:center;font-size:1.2rem;box-shadow:0 4px 16px rgba(139,92,246,0.3)">🎙</div>';
  h+='<div id="phWaveform" style="display:flex;align-items:center;gap:2px;height:32px"></div>';

  ct.innerHTML=h;

  showBadge('Bespoke AI feedback','🎯',600);

  // Animate waveform
  var wf=document.getElementById('phWaveform');
  if(wf){
    var bars='';
    for(var i=0;i<16;i++){
      bars+='<div style="width:3px;border-radius:2px;background:linear-gradient(to top,#8b5cf6,#d946ef);animation:ph-wave 0.6s ease-in-out '+(i*0.08)+'s infinite"></div>';
    }
    wf.innerHTML=bars;
  }

  // Recording complete -> show feedback
  setTimeout(function(){
    var wf2=document.getElementById('phWaveform');
    var rl=document.getElementById('phRecLabel');
    var mc=document.getElementById('phMicCircle');
    var tm=document.getElementById('phTimer');
    if(wf2){wf2.style.opacity='0';}
    if(rl){rl.textContent='Answer recorded';rl.style.color='#22c55e';}
    if(mc){mc.style.background='linear-gradient(135deg,#22c55e,#16a34a)';mc.innerHTML='✓';mc.style.fontSize='1.2rem';mc.style.color='#fff';}
    if(tm){tm.textContent='02:18';}
  },3000);

  // Show feedback panel
  setTimeout(function(){
    var rp=document.getElementById('phIntRight');
    if(rp){
      rp.style.opacity='1';
      var fh='<div style="animation:ph-slide-in-r 0.5s ease both">';
      fh+='<div style="display:flex;align-items:center;gap:0.4rem;margin-bottom:0.65rem"><span style="font-size:0.7rem">⚡</span><span style="font-size:0.72rem;font-weight:700;color:#1e1b4b">AI Feedback</span></div>';

      // Score ring
      fh+='<div style="display:flex;align-items:center;gap:0.75rem;margin-bottom:0.65rem;padding:0.6rem;background:linear-gradient(135deg,#f5f3ff,#ede9fe);border-radius:12px;border:1px solid #ddd6fe">';
      fh+='<div style="width:60px;height:60px;border-radius:50%;position:relative;flex-shrink:0;animation:ph-pop 0.6s ease both">';
      fh+='<svg width="60" height="60" viewBox="0 0 60 60" style="transform:rotate(-90deg)"><circle cx="30" cy="30" r="26" fill="none" stroke="#ede9fe" stroke-width="4"/><circle cx="30" cy="30" r="26" fill="none" stroke="#8b5cf6" stroke-width="4" stroke-dasharray="163.4" stroke-dashoffset="29.4" stroke-linecap="round" style="transition:stroke-dashoffset 1s ease"/></svg>';
      fh+='<span style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:1rem;font-weight:900;color:#7c3aed">82</span></div>';
      fh+='<div><p style="font-size:0.65rem;font-weight:700;color:#1e1b4b;margin:0 0 2px">Strong Performance</p><p style="font-size:0.48rem;color:#6b7280;margin:0">STAR framework applied well</p></div></div>';

      // Breakdown bars
      fh+='<div style="margin-bottom:0.55rem">';
      var metrics=[{l:'Situation',v:90,c:'#22c55e'},{l:'Task',v:85,c:'#8b5cf6'},{l:'Action',v:78,c:'#8b5cf6'},{l:'Result',v:72,c:'#f59e0b'}];
      for(var i=0;i<metrics.length;i++){
        var m=metrics[i];
        fh+='<div style="margin-bottom:0.35rem"><div style="display:flex;justify-content:space-between;margin-bottom:2px"><span style="font-size:0.48rem;font-weight:600;color:#374151">'+m.l+'</span><span style="font-size:0.46rem;font-weight:700;color:'+m.c+'">'+m.v+'%</span></div>';
        fh+='<div style="height:4px;border-radius:100px;background:#ede9fe;overflow:hidden"><div style="height:100%;border-radius:100px;background:'+m.c+';width:'+m.v+'%;transition:width 0.8s ease '+(i*0.15)+'s"></div></div></div>';
      }
      fh+='</div>';

      // Strengths
      fh+='<div style="margin-bottom:0.45rem"><p style="font-size:0.5rem;font-weight:700;color:#22c55e;margin:0 0 0.25rem">✓ What you did well</p>';
      fh+='<p style="font-size:0.48rem;color:#374151;line-height:1.5;margin:0">Clear context setting, specific metrics used (£2.4M, 42 team members), structured delivery</p></div>';

      // Focus areas
      fh+='<div><p style="font-size:0.5rem;font-weight:700;color:#8b5cf6;margin:0 0 0.25rem">◎ Where to focus</p>';
      fh+='<p style="font-size:0.48rem;color:#374151;line-height:1.5;margin:0">Quantify the result more — add timeline or percentage improvement achieved</p></div>';

      fh+='</div>';
      rp.innerHTML=fh;
    }
  },3800);

  // Fade out
  setTimeout(function(){
    hideBadge();
    ct.style.animation='ph-fade-out 0.35s ease both';
    setTimeout(onDone,400);
  },8200);

// ============ SCENE 4: Dashboard ============
function sceneDashboard(onDone){
  renderSidebar('dashboard');
  ct.style.animation='none';
  void ct.offsetWidth;

  var h='<div style="height:100%;padding:1rem 1.5rem;animation:ph-fade-in 0.4s ease both;overflow:hidden">';

  // Welcome banner
  h+='<div style="background:linear-gradient(135deg,#4c1d95,#7c3aed);border-radius:14px;padding:1rem 1.5rem;margin-bottom:0.85rem;position:relative;overflow:hidden">';
  h+='<div style="position:absolute;top:-50%;right:-10%;width:200px;height:200px;background:radial-gradient(circle,rgba(186,103,239,0.25) 0%,transparent 70%);pointer-events:none"></div>';
  h+='<h3 style="font-size:0.92rem;font-weight:700;color:#fff;margin:0 0 0.2rem;position:relative;z-index:1">Welcome back, Alex 👋</h3>';
  h+='<p style="font-size:0.6rem;color:rgba(255,255,255,0.7);margin:0 0 0.5rem;position:relative;z-index:1">Your career journey is 68% complete. Keep going!</p>';
  h+='<div style="height:5px;border-radius:100px;background:rgba(255,255,255,0.15);overflow:hidden;max-width:300px;position:relative;z-index:1"><div id="phProgress" style="height:100%;border-radius:100px;background:linear-gradient(90deg,#a78bfa,#d946ef);width:0%;transition:width 1.5s ease"></div></div>';
  h+='</div>';

  // Stats row
  h+='<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:0.65rem;margin-bottom:0.85rem">';
  var stats=[
    {icon:'📄',label:'CVs Created',value:'3',color:'#8b5cf6'},
    {icon:'🔍',label:'Jobs Viewed',value:'47',color:'#d946ef'},
    {icon:'🎤',label:'Interviews Practised',value:'12',color:'#22c55e'},
    {icon:'📬',label:'Applications',value:'8',color:'#f59e0b'}
  ];
  for(var i=0;i<stats.length;i++){
    var s=stats[i];
    h+='<div style="background:#fff;border-radius:12px;border:1px solid #f0ebfa;padding:0.65rem;text-align:center;animation:ph-fade-in 0.4s ease '+(i*0.12)+'s both">';
    h+='<span style="font-size:1rem;display:block;margin-bottom:0.25rem">'+s.icon+'</span>';
    h+='<span id="phStat'+i+'" data-target="'+s.value+'" style="font-size:1.15rem;font-weight:900;color:'+s.color+';display:block;margin-bottom:0.1rem;animation:ph-counter 0.5s ease '+(0.5+i*0.15)+'s both">0</span>';
    h+='<span style="font-size:0.48rem;font-weight:500;color:#94a3b8">'+s.label+'</span></div>';
  }
  h+='</div>';

  // Feature cards
  h+='<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:0.65rem">';
  var features=[
    {icon:'📄',title:'CV Builder',desc:'AI-powered CV creation and optimisation',color:'#8b5cf6',bg:'linear-gradient(135deg,#f5f3ff,#ede9fe)'},
    {icon:'🔍',title:'Job Search',desc:'Smart vibe matching for your ideal role',color:'#d946ef',bg:'linear-gradient(135deg,#fdf4ff,#fae8ff)'},
    {icon:'🎤',title:'Interview Prep',desc:'Bespoke practice with AI feedback',color:'#22c55e',bg:'linear-gradient(135deg,#f0fdf4,#dcfce7)'}
  ];
  for(var i=0;i<features.length;i++){
    var f=features[i];
    h+='<div style="background:'+f.bg+';border-radius:12px;padding:0.75rem;border:1px solid #e9e0fd;animation:ph-fade-in 0.4s ease '+(0.3+i*0.15)+'s both">';
    h+='<span style="font-size:1.1rem;display:block;margin-bottom:0.3rem">'+f.icon+'</span>';
    h+='<p style="font-size:0.68rem;font-weight:700;color:#1e1b4b;margin:0 0 0.15rem">'+f.title+'</p>';
    h+='<p style="font-size:0.48rem;color:#6b7280;margin:0;line-height:1.4">'+f.desc+'</p></div>';
  }
  h+='</div>';
  h+='</div>';
  ct.innerHTML=h;

  showBadge('Your career command centre','🚀',500);

  // Animate progress bar
  setTimeout(function(){
    var pb=document.getElementById('phProgress');
    if(pb){pb.style.width='68%';}
  },300);

  // Count-up animation for stats
  setTimeout(function(){
    for(var i=0;i<stats.length;i++){
      (function(idx){
        var el=document.getElementById('phStat'+idx);
        if(!el) return;
        var target=parseInt(el.getAttribute('data-target'));
        var current=0;
        var steps=Math.min(target,20);
        var inc=Math.max(1,Math.ceil(target/steps));
        var interval=Math.max(30,Math.floor(600/steps));
        var timer=setInterval(function(){
          current+=inc;
          if(current>=target){current=target;clearInterval(timer);}
          el.textContent=current;
        },interval);
      })(i);
    }
  },600);

  // Fade out
  setTimeout(function(){
    hideBadge();
    ct.style.animation='ph-fade-out 0.35s ease both';
    setTimeout(onDone,400);
  },5500);
}

// ============ MASTER LOOP ============
function runLoop(){
  sceneCv(function(){
    sceneJobs(function(){
      sceneInterview(function(){
        sceneDashboard(function(){
          setTimeout(runLoop,200);
        });
      });
    });
  });
}

runLoop();
})();
</script>
