<!DOCTYPE html>
<html><head><meta charset="utf-8">
<style>
*{margin:0;padding:0;box-sizing:border-box}
@keyframes hvc-ring-spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes hvc-pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.07)}}
@keyframes hvc-shimmer{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
@keyframes hvc-fade-in{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes hvc-glow{0%,100%{box-shadow:0 8px 32px rgba(139,92,246,0.12),0 2px 8px rgba(139,92,246,0.06)}50%{box-shadow:0 12px 40px rgba(139,92,246,0.18),0 4px 12px rgba(168,85,247,0.1)}}
@keyframes hvc-tag-fade{from{opacity:0;transform:translateX(-6px)}to{opacity:1;transform:translateX(0)}}
@keyframes hvc-border-shimmer{0%{background-position:100% 50%}100%{background-position:-100% 50%}}
body{display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:transparent;padding:20px}
.hvc-shimmer-wrap{border-radius:18px;padding:2px;background:linear-gradient(90deg,hsl(270,80%,55%) 0%,hsl(290,70%,50%) 25%,hsl(250,80%,60%) 50%,hsl(300,80%,70%) 60%,hsl(250,80%,60%) 70%,hsl(290,70%,50%) 85%,hsl(270,80%,55%) 100%);background-size:200% 100%;animation:hvc-border-shimmer 3s ease-in-out infinite;box-shadow:0 25px 50px rgba(91,33,182,0.2),0 12px 24px rgba(0,0,0,0.1)}
</style>
</head><body>
<div class="hvc-shimmer-wrap">
<div style="width:420px;background:#fff;border-radius:16px;border:none;padding:28px;cursor:pointer;animation:hvc-fade-in 0.6s ease,hvc-glow 3s ease-in-out infinite;transition:transform 0.2s ease;position:relative;overflow:hidden">
  <div style="position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,#a855f7,#d946ef,#a855f7);border-radius:16px 16px 0 0"></div>
  <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px">
    <div style="flex:1">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
        <span style="font-size:0.82rem;font-weight:600;color:#6b7280;letter-spacing:-0.01em">Deloitte</span>
        <span style="font-size:0.58rem;font-weight:700;color:#7c3aed;background:linear-gradient(135deg,#ede9fe,#f3e8ff);padding:2px 7px;border-radius:4px;letter-spacing:0.02em;border:1px solid #ddd6fe;white-space:nowrap;line-height:1.4">MyPathfinder Verified</span>
      </div>
      <h3 style="font-size:1.15rem;font-weight:700;color:#1e1b4b;margin:0;letter-spacing:-0.02em;line-height:1.3">Senior Project Manager</h3>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;width:56px;height:56px;border-radius:50%;flex-shrink:0;position:relative;background:transparent;border:none;animation:hvc-pulse 1.8s ease-in-out infinite;margin-left:12px">
      <div style="position:absolute;inset:0;border-radius:50%;padding:2.5px;background:conic-gradient(from 0deg,#f0abfc,#d946ef,#a855f7,#7c3aed,#a855f7,#d946ef,#f0abfc);-webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);-webkit-mask-composite:xor;mask-composite:exclude;animation:hvc-ring-spin 1.5s linear infinite"></div>
      <span style="font-size:1.35rem;font-weight:900;line-height:1;letter-spacing:-0.5px;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:1;background-image:linear-gradient(135deg,#fff,#f0abfc,#d946ef,#a855f7);background-size:200% 200%;background-clip:text;-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:hvc-shimmer 2s ease-in-out infinite;filter:drop-shadow(0 0 10px rgba(217,70,239,0.8)) drop-shadow(0 0 20px rgba(168,85,247,0.5)) drop-shadow(0 0 35px rgba(139,92,246,0.3))">95</span>
    </div>
  </div>
  <div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:20px">
    <span style="display:inline-flex;align-items:center;gap:5px;font-size:0.78rem;font-weight:500;color:#6b7280;background:#f9fafb;padding:5px 10px;border-radius:6px;border:1px solid #f3f4f6;animation:hvc-tag-fade 0.5s ease 0.2s both">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
      London, UK
    </span>
    <span style="display:inline-flex;align-items:center;gap:5px;font-size:0.78rem;font-weight:500;color:#6b7280;background:#f9fafb;padding:5px 10px;border-radius:6px;border:1px solid #f3f4f6;animation:hvc-tag-fade 0.5s ease 0.3s both">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="14" rx="2" ry="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>
      Full-Time
    </span>
    <span style="display:inline-flex;align-items:center;gap:4px;font-size:0.72rem;font-weight:600;color:#7c3aed;background:linear-gradient(135deg,#f5f3ff,#ede9fe);padding:5px 10px;border-radius:6px;border:1px solid #ddd6fe;animation:hvc-tag-fade 0.5s ease 0.4s both">
      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
      Hybrid
    </span>
  </div>
  <div style="display:flex;justify-content:space-between;align-items:center;padding-top:16px;border-top:1px solid #f3f0fa">
    <span style="font-size:1.05rem;font-weight:700;color:#1e1b4b;letter-spacing:-0.02em">
      &#163;65,000
      <span style="font-weight:400;color:#94a3b8;font-size:0.82rem">/yr</span>
    </span>
    <span style="display:inline-flex;align-items:center;gap:4px;font-size:0.75rem;font-weight:500;color:#9ca3af">
      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      2 days ago
    </span>
  </div>
</div>
</div>
</body></html>
